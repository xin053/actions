name: diskimage-builder
on:
  workflow_dispatch:
    inputs:
      image-description:
        description: "Image description (used to generate release description)"
        required: true
        type: string
      image-version:
        description: "Which image version to build"
        required: true
        type: choice
        options:
          - ubuntu-26.04-resolute
          - ubuntu-24.04-noble
          - ubuntu-22.04-jammy
          - ubuntu-20.04-focal
          - ubuntu-18.04-bionic
          - ubuntu-16.04-xenial
          - centos-10_stream
          - centos-9_stream
          - centos-8
          - centos-7
          - debian-13-trixie
          - debian-12-bookworm
          - debian-11-bullseye
          - debian-10-buster
          - debian-9-stretch
          - fedora-43
          - fedora-42
          - fedora-41
          - fedora-40
          - fedora-39
          - fedora-38
          - rocky-10
          - rocky-9
          - rocky-8
          - almalinux-10
          - almalinux-9
          - almalinux-8
          - openeuler-24.03
          - openeuler-22.03
      boot-mode:
        description: "Boot mode"
        required: true
        type: choice
        options:
          - uefi
          - bios
      image-format:
        description: "Image format"
        required: true
        type: choice
        options:
          - qcow2
          - raw
      build-with-docker:
        description: "Build image using quay.io/zuul-ci/nodepool-builder(only openeuler suggest)"
        required: false
        type: choice
        options:
          - "no"
          - "yes"
      ironic-partition-image:
        description: "Build ironic partition image or not"
        required: false
        type: choice
        options:
          - "no"
          - "yes"
      fedora-v2v-image:
        description: "Build fedora v2v image or not"
        required: false
        type: choice
        options:
          - "no"
          - "yes"
      nvidia-driver:
        description: "Build image with nvidia-driver, nvlink, doca driver and GPU stress test tools(DCGM and gpu_burn)"
        required: false
        type: choice
        options:
          - "no"
          - "yes-535"
          - "yes-535-nvlink-5_535"
          - "yes-535-gpu_stress_test"
          - "yes-580"
          - "yes-580-nvlink-5"
          - "yes-580-gpu_stress_test"
          - "yes-595"
          - "yes-595-nvlink-5"
          - "yes-595-gpu_stress_test"
      cuda:
        description: "Build image with cuda"
        required: false
        type: choice
        options:
          - "no"
          - "yes-13_2"
          - "yes-13_1"
          - "yes-13_0"
          - "yes-12_9"
          - "yes-12_8"
          - "yes-12_6"
          - "yes-12_5"
          - "yes-12_4"
          - "yes-12_3"
          - "yes-12_2"
          - "yes-12_1"
          - "yes-12_0"
          - "yes-11_8"
      build-param:
        description: "Param of build_images.sh"
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Aggressive free disk space
        run: |
          echo "################################"
          echo "Disk usage BEFORE cleanup:"
          echo "################################"
          df -h
          echo "Removing hosted toolcache..."
          sudo rm -rf /opt/hostedtoolcache || true
          echo "Removing .NET..."
          sudo rm -rf /usr/share/dotnet || true
          echo "Removing Android SDK..."
          sudo rm -rf /usr/local/lib/android || true
          echo "Removing GHC / Haskell..."
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/local/.ghcup || true
          echo "Docker prune (just in case runner had leftovers)..."
          sudo docker container prune -f || true
          sudo docker image prune -af || true
          sudo docker volume prune -f || true
          echo "################################"
          echo "Disk usage AFTER cleanup:"
          echo "################################"
          df -h

      - name: Echo build-param
        run: echo ${{ github.event.inputs.build-param }}

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d_%H-%M')" >> $GITHUB_OUTPUT

      - name: enable KVM for linux runners
        if: runner.os == 'Linux'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Checkout mye-scripts
        uses: actions/checkout@v4
        with:
          repository: xin053/mye-scripts
          path: mye-scripts
          ref: 'master'
          token: ${{ secrets.MY_GITHUB_TOKEN }}

      - name: Get image info
        id: image
        run: |
          IFS='-' read -ra parts <<< ${{ github.event.inputs.image-version }}
          echo "image_type_lower=$(echo ${parts[0]} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          echo "image_type_upper=$(echo ${parts[0]} | tr '[:lower:]' '[:upper:]')" >> $GITHUB_OUTPUT
          echo "image_version=$(echo ${parts[-1]} | tr '_' '-')" >> $GITHUB_OUTPUT

          IFS='-' read -ra parts1 <<< ${{ github.event.inputs.nvidia-driver }}
          echo "nvidia_driver=${parts1[0]}" >> $GITHUB_OUTPUT
          echo "nvidia_driver_version=${parts1[1]}" >> $GITHUB_OUTPUT
          if [[ ${parts1[2]} == "nvlink" ]]; then
            echo "nvlink_install=yes" >> $GITHUB_OUTPUT
            echo "nvlink_version=${parts1[3]}" >> $GITHUB_OUTPUT
          else
            echo "nvlink_install=no" >> $GITHUB_OUTPUT
            echo "nvlink_version=${parts1[3]}" >> $GITHUB_OUTPUT
          fi
          if [[ ${parts1[2]} == "gpu_stress_test" ]]; then
            echo "nvidia_gpu_stress_test=yes" >> $GITHUB_OUTPUT
          else
            echo "nvidia_gpu_stress_test=no" >> $GITHUB_OUTPUT
          fi

          IFS='-' read -ra parts2 <<< ${{ github.event.inputs.cuda }}
          echo "cuda_install=${parts2[0]}" >> $GITHUB_OUTPUT
          echo "cuda_version=${parts2[1]}" >> $GITHUB_OUTPUT

          if [[ ${parts1[0]} == "no" ]]; then
            echo "image_description=${{ github.event.inputs.image-description }}_${{ github.event.inputs.boot-mode }}" >> $GITHUB_OUTPUT
          else
            description="nvidia_${parts1[1]}"
            if [[ ${parts2[0]} == "yes" ]]; then
              description="${description}_cuda_${parts2[1]}"
            fi
            if [[ ${parts1[2]} == "gpu_stress_test" ]]; then
              description="${description}_gpu_stress_test"
            elif [[ ${parts1[2]} == "nvlink" ]]; then
              description="${description}_nvlink_${parts1[3]}"
            else
              description="${description}"
            fi
            echo "image_description=${{ github.event.inputs.image-description }}_${{ github.event.inputs.boot-mode }}_${description}" >> $GITHUB_OUTPUT
          fi

      - name: Get build image command
        id: command
        run: |
          echo 'build_image_command="GITHUB_ACTION=yes BUILD_WITH_DOCKER=${{ github.event.inputs.build-with-docker }} STORE_PATH=$GITHUB_WORKSPACE/mye-scripts IMAGE=${{ steps.image.outputs.image_type_lower }} ${{ steps.image.outputs.image_type_upper }}_RELEASE=${{ steps.image.outputs.image_version }} BOOT_MODE=${{ github.event.inputs.boot-mode }} IRONIC_PARTITION_IMAGE=${{ github.event.inputs.ironic-partition-image }} FEDORA_V2V=${{ github.event.inputs.fedora-v2v-image }} NVIDIA_DRIVER=${{ steps.image.outputs.nvidia_driver }} NVIDIA_DRIVER_VERSION=${{ steps.image.outputs.nvidia_driver_version }} CUDA_INSTALL=${{ steps.image.outputs.cuda_install }} CUDA_VERSION=${{ steps.image.outputs.cuda_version }} NVLINK_INSTALL=${{ steps.image.outputs.nvlink_install }} NVLINK_VERSION=${{ steps.image.outputs.nvlink_version }} DOCA_INSTALL=${{ steps.image.outputs.nvlink_install }} NVIDIA_GPU_STRESS_TEST=${{ steps.image.outputs.nvidia_gpu_stress_test }} IMAGE_FORMAT=${{ github.event.inputs.image-format }} ${{ github.event.inputs.build-param }} bash ./build_image.sh"' >> $GITHUB_OUTPUT

      - name: Echo build image command
        run: "echo ${{ steps.command.outputs.build_image_command }}"

      - name: Build image
        run: "cd $GITHUB_WORKSPACE/mye-scripts && sudo bash -c ${{ steps.command.outputs.build_image_command }}"

      - name: List files
        run: "ls -alh $GITHUB_WORKSPACE/mye-scripts"

      - name: Rename files
        run: "cd $GITHUB_WORKSPACE/mye-scripts && for file in *.qcow2 *.raw *.vmlinuz *.initrd; do if [ -f $file ]; then if [[ $(stat --printf='%s' $file) -gt 2097152000 ]]; then sudo split --bytes=2000M --numeric-suffixes=1 $file ${{ steps.image.outputs.image_description }}_$file.part && sudo rm -f $file; else sudo mv $file ${{ steps.image.outputs.image_description }}_$file;fi;fi;done"

      - name: Md5sum
        run: |
          cd $GITHUB_WORKSPACE/mye-scripts
          echo "md5sum:" >> md5sum.txt
          for file in *.qcow2* *.raw* *.vmlinuz* *.initrd*; do if [ -f $file ]; then md5sum $file >> md5sum.txt;fi;done

      - name: List files again
        run: "ls -alh $GITHUB_WORKSPACE/mye-scripts"

      - name: Upload to release file
        uses: softprops/action-gh-release@v2
        with:
          name: dib_${{ steps.image.outputs.image_description }}_${{ steps.date.outputs.date }}
          tag_name: dib_${{ steps.image.outputs.image_description }}_${{ steps.date.outputs.date }}
          body_path: ${{ github.workspace }}/mye-scripts/md5sum.txt
          files: |
            ./mye-scripts/*.qcow2
            ./mye-scripts/*.qcow2.part*
            ./mye-scripts/*.raw
            ./mye-scripts/*.raw.part*
            ./mye-scripts/*.vmlinuz
            ./mye-scripts/*.vmlinuz.part*
            ./mye-scripts/*.initrd
            ./mye-scripts/*.initrd.part*
